<!DOCTYPE html>
<html>
<head><title>Garmin Login</title></head>
<body>
<p id="msg">Verbinde mit Garmin...</p>
<script>
  // Extract ticket from URL, send to opener, close
  var params = new URLSearchParams(window.location.search);
  var ticket = params.get("ticket");
  var msg = document.getElementById("msg");
  if (ticket && window.opener) {
    window.opener.postMessage({ garminTicket: ticket }, window.location.origin);
    msg.textContent = "Verbunden! Fenster schließt sich...";
    setTimeout(function() { window.close(); }, 500);
  } else if (!ticket) {
    msg.textContent = "Fehler: Kein Ticket erhalten.";
  } else {
    msg.textContent = "Fehler: Kein Opener-Fenster.";
  }
</script>
</body>
</html>
